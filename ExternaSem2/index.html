<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Student Grade Calculator</h2>

        <input type="number" id="sub1" placeholder="Subject 1 Marks">
        <input type="number" id="sub2" placeholder="Subject 2 Marks">
        <input type="number" id="sub3" placeholder="Subject 3 Marks">
        <input type="number" id="sub4" placeholder="Subject 4 Marks">
        <input type="number" id="sub5" placeholder="Subject 5 Marks">

        <button onclick="calculate()">Calculate</button>

        <div id="output"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
